<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>libretro slang shaders on the web — crt-royale</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body { font-family: sans-serif; margin: 0; background: #15161a; color: #ddd; display: flex; flex-direction: column; height: 100vh; }
  header { padding: 8px 14px; background: #1e2026; display: flex; gap: 14px; align-items: center; flex-wrap: wrap; }
  header label { font-size: 13px; }
  select, button, input[type=file] { font-size: 13px; background:#2a2d35; color:#ddd; border:1px solid #444; border-radius:4px; padding:4px 6px; }
  #status { font-size: 12px; color: #9ad; padding: 4px 14px; min-height: 16px; white-space: pre-wrap; display: flex; justify-content: space-between; gap: 12px; }
  #content { display: flex; flex: 1; min-height: 0; }
  #view { flex: 1; background: #000; min-width: 0; position: relative; overflow: hidden; }
  #canvasWrap { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
  #fps { font: 12px monospace; color: #9f9; flex: none; }
  canvas { max-width: 100%; max-height: 100%; image-rendering: auto; }
  #params { width: 320px; overflow-y: auto; background: #1b1d22; padding: 8px; font-size: 12px; }
  .param { margin-bottom: 6px; }
  .param label { display: block; color: #aaa; }
  .param input[type=range] { width: 60%; vertical-align: middle; }
  .param .val { display:inline-block; width: 56px; text-align: right; }
  .param-reset { background: none; border: none; outline: none; padding: 0 4px; margin: 0;
    color: #9ad; cursor: pointer; font-size: 14px; line-height: 1; vertical-align: middle; }
  .param-reset:hover { color: #fff; }
  #params h3 { margin: 4px 0 8px; font-size: 13px; color:#9ad; }
  a { color: #9ad; }
  /* actual-size mode: canvas at native device pixels; the inner wrapper
     scrolls so floating controls (#vid, #showControls) stay over the view */
  #view.actual #canvasWrap { overflow: auto; align-items: flex-start; justify-content: flex-start; }
  #view.actual canvas { max-width: none; max-height: none; margin: auto; }
  @media (max-width: 800px) {
    #content { flex-direction: column; }
    #view { min-height: 45vh; }
    #params { width: auto; max-height: 45vh; border-top: 1px solid #333; }
  }
  /* fullscreen: only the canvas view is shown */
  body.fs header, body.fs #status, body.fs #params { display: none; }
  body.fs #content { flex-direction: row; }
  #showControls { position: absolute; top: 10px; right: 10px; z-index: 10; display: none;
    opacity: 0; transition: opacity 0.3s; }
  body.fs #showControls { display: block; }
  body.fs #showControls.visible { opacity: 1; }
  /* video transport controls floating over the view, clear of the scrollbar */
  #vid { position: absolute; left: 12px; right: 12px; bottom: 18px; display: none; align-items: center;
    gap: 8px; padding: 8px 12px; background: rgba(0,0,0,0.65); border-radius: 8px;
    opacity: 0; transition: opacity 0.3s; z-index: 9; }
  #vid.active { display: flex; }
  #vid.active.visible { opacity: 1; }
  #vid button { background: none; border: none; color: #fff; font-size: 16px; cursor: pointer; padding: 2px 4px; }
  #vid #vidSeek { flex: 1; }
  #vid #vidVol { width: 80px; }
  #vid #vidTime { font: 12px monospace; color: #fff; white-space: nowrap; }
</style>
</head>
<body>
<header>
  <strong>CRT slang shaders</strong>
  <label>Media: <input type="file" id="file" accept="image/*,video/*"></label>
  <label>Shader: <select id="preset"></select></label>
  <label>Input: <select id="inputRes">
    <option value="native">Native (1×)</option>
    <option value="/2">Downscale 2×</option>
    <option value="/3">Downscale 3×</option>
    <option value="/4">Downscale 4×</option>
    <option value="custom-scale">Downscale custom…</option>
    <option value="256x240">256×240 (NES)</option>
    <option value="256x224">256×224 (SNES)</option>
    <option value="320x224">320×224 (Genesis)</option>
    <option value="320x240" selected>320×240 (PS1 / 240p)</option>
    <option value="640x480">640×480 (480p)</option>
    <option value="custom-res">Custom resolution…</option>
  </select><input type="text" id="inputCustom" size="7" style="display:none"></label>
  <label>Crop: <select id="crop">
    <option value="none" selected>None</option>
    <option value="4:3">4:3</option>
    <option value="16:9">16:9</option>
    <option value="1:1">1:1</option>
    <option value="3:2">3:2</option>
    <option value="custom">Custom…</option>
  </select><input type="text" id="cropCustom" size="6" style="display:none"></label>
  <label>Fit: <select id="fit">
    <option value="auto" selected>Auto</option>
    <option value="fit">Scale to fit</option>
    <option value="stretch">Stretch</option>
  </select></label>
  <label>Aspect: <select id="aspect">
    <option value="4:3" selected>4:3</option>
    <option value="16:9">16:9</option>
    <option value="source">Match input</option>
  </select></label>
  <label>Output: <select id="resolution">
    <option value="1920x1080" selected>1080p</option>
    <option value="2560x1440">1440p</option>
    <option value="3840x2160">4K</option>
    <option value="1280x720">720p</option>
  </select></label>
  <label><input type="checkbox" id="actualSize" checked> Actual size (1:1 pixels)</label>
  <label><input type="checkbox" id="flipY"> Flip vertical</label>
  <button id="reload">Reload shader</button>
  <button id="resetParams">Reset params</button>
  <button id="download">Download image</button>
  <button id="fullscreen">Fullscreen</button>
</header>
<div id="status"><span id="statusText">Loading…</span><span id="fps">– fps</span></div>
<div id="content">
  <div id="view"><div id="canvasWrap"><canvas id="canvas" width="1920" height="1080"></canvas></div><button id="showControls">Show controls</button>
    <div id="vid">
      <button id="vidPlay" title="Play/Pause">▶</button>
      <input type="range" id="vidSeek" min="0" max="1000" value="0">
      <span id="vidTime">0:00 / 0:00</span>
      <button id="vidMute" title="Mute">🔊</button>
      <input type="range" id="vidVol" min="0" max="1" step="0.01" value="1">
    </div>
  </div>
  <div id="params"><div id="advanced"></div><h3>Shader parameters</h3><div id="paramList"></div></div>
</div>
<script type="module" src="js/main.js"></script>
</body>
</html>
